[project]
name = "sovereign-fastapi"
version = "1.0.0"
description = "FastAPI/Starlette ASGI middleware for the Sovereign Systems SDK"
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
authors = [
    { name = "kenwalger", email = "kenalger@comcast.net" }
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Intended Audience :: Developers",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "sovereign-core>=1.0.0,<2.0.0",
    "starlette>=0.35.0,<1.0.0",
]

[project.urls]
Homepage = "https://github.com/kenwalger/sovereign-sdk"
Repository = "https://github.com/kenwalger/sovereign-sdk"
Changelog = "https://github.com/kenwalger/sovereign-sdk/blob/main/CHANGELOG.md"

[tool.uv.sources]
sovereign-core = { workspace = true }

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
sovereign_fastapi = ["py.typed"]

[build-system]
requires = ["setuptools>=77.0.0"]
build-backend = "setuptools.build_meta"
