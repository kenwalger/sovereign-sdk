[project]
name = "sovereign-runtime"
version = "0.1.0"
description = "Local runtime worker for Sovereign execution"
readme = "README.md"
requires-python = ">=3.12"
authors = [
    { name = "kenwalger", email = "kenalger@comcast.net" }
]

dependencies = [
    "sovereign-core",
    "click>=8.1.0",
    "python-dotenv>=1.0.0",
]

[tool.uv.sources]
sovereign-core = { workspace = true }

[project.scripts]
sovereign-node = "sovereign_runtime.__main__:main"

[tool.setuptools.packages.find]
where = ["src"]

# Change this from hatchling to setuptools
[build-system]
requires = ["setuptools>=61.0.0"]
build-backend = "setuptools.build_meta"